# VA VAE Dataset Configuration - STATIC VARIABLES ONLY
# Schema version: 1.0.0
# Use with --append to add static variables to an existing zarr without overwriting.
# Example:
#   python build_zarr.py va_vae_dataset_static_only.yaml --append --log-file static.log

dataset:
  name: va_vae_raster_dataset
  version: "1.0.0"

  out_zarr:
    path: /data/VA/zarr/va_vae_dataset.zarr
    structure: hierarchical

  spatial:
    crs:
      wkt: |
        PROJCS["AEA_WGS84",
          GEOGCS["GCS_WGS_1984",
            DATUM["WGS_1984",
              SPHEROID["WGS_84",6378137,298.257223563]],
            PRIMEM["Greenwich",0],
            UNIT["Degree",0.0174532925199433]],
          PROJECTION["Albers_Conic_Equal_Area"],
          PARAMETER["False_Easting",0],
          PARAMETER["False_Northing",0],
          PARAMETER["Central_Meridian",-96],
          PARAMETER["Standard_Parallel_1",29.5],
          PARAMETER["Standard_Parallel_2",45.5],
          PARAMETER["Latitude_Of_Origin",23],
          UNIT["Meter",1]]

    resolution: 30

    transform: [30, 0, 1089315, 0, -30, 1966485]

    bounds:
      xmin: 1089315
      ymin: 1574805
      xmax: 1795875
      ymax: 1966485

  dtype:
    default: float16
    continuous: float16
    categorical: int16
    mask: uint8

  default_chunk:
    static: {y: 256, x: 256, bands: all}

  compressor:
    name: blosc
    cname: lz4
    clevel: 3
    shuffle: 2

  statistics:
    spatial_mask: aoi
    continuous: [mean, sd, min, q02, q25, q50, q75, q98, max]
    categorical: histogram
    boolean: [true_count, false_count, true_fraction]
    embed_in_zarr: true
    export_json: true
    export_csv: true

  reprojection:
    enabled: true
    crs_match_mode: projection
    resolution_tolerance_m: 1.0
    interpolation: nearest

aoi:
  type: static
  path: /data/VA/main/va_mask.tif

strata:
  type: static
  path: /data/VA/main/va_strata.tif

static:
  - group: evt
    path: /data/landfire/LF2024_EVT_CONUS/Tif/LF2024_EVT_CONUS.tif
    data:
      semantic_type: categorical
      bands:
        - id: evt
          source_band: 1

  - group: topo
    path: /data/VA/topo/topo_soils_features.vrt
    data:
      semantic_type: continuous
      bands:
        - id: elevation
          source_band: 1
        - id: slope_deg
          source_band: 2
        - id: northness
          source_band: 3
        - id: eastness
          source_band: 4
        - id: HAND
          source_band: 5
        - id: TWI
          source_band: 6
        - id: TPI_500m
          source_band: 7
        - id: ksat_log10_0_5
          source_band: 8

  - group: soils_masks
    path: /data/VA/topo/topo_soils_masks_30m_aea.tif
    mask:
      semantic_type: mask
      bands:
        - id: dem_mask
          source_band: 1
        - id: tpi_mask
          source_band: 2
        - id: hand_mask
          source_band: 3
        - id: twi_mask
          source_band: 4
        - id: ksat_mask
          source_band: 5

  - group: ccdc_metrics_history
    path: /data/VA/ccdc/ccdc_metrics_1986_2024.vrt
    data:
      semantic_type: continuous
      bands:
        # Section 3: duration-weighted mean state (8)
        - id: mean_green
          source_band: 64
        - id: mean_red
          source_band: 65
        - id: mean_nir
          source_band: 66
        - id: mean_swir1
          source_band: 67
        - id: mean_swir2
          source_band: 68
        - id: mean_ndvi
          source_band: 69
        - id: mean_nbr
          source_band: 70
        - id: mean_ndmi
          source_band: 71

        # Section 3b: harmonics mean amps (4)
        - id: mean_seasonal_amp_red
          source_band: 72
        - id: mean_seasonal_amp_nir
          source_band: 73
        - id: mean_seasonal_amp_swir1
          source_band: 74
        - id: mean_seasonal_amp_swir2
          source_band: 75

        # Section 3b: mean SNR (4)
        - id: mean_seasonal_snr_red
          source_band: 76
        - id: mean_seasonal_snr_nir
          source_band: 77
        - id: mean_seasonal_snr_swir1
          source_band: 78
        - id: mean_seasonal_snr_swir2
          source_band: 79

        # Section 3b: variance of amp (4)
        - id: variance_seasonal_amp_red
          source_band: 80
        - id: variance_seasonal_amp_nir
          source_band: 81
        - id: variance_seasonal_amp_swir1
          source_band: 82
        - id: variance_seasonal_amp_swir2
          source_band: 83

        # Section 3b: summary (4)
        - id: max_seasonal_amp_nir
          source_band: 84
        - id: net_change_seasonal_amp_nir
          source_band: 85
        - id: max_seasonal_amp_swir1
          source_band: 86
        - id: net_change_seasonal_amp_swir1
          source_band: 87

        # Section 4: trajectory (7)
        - id: total_spectral_distance
          source_band: 88
        - id: spectral_distance_per_decade
          source_band: 89
        - id: mean_spectral_velocity
          source_band: 90
        - id: net_change_ndvi
          source_band: 91
        - id: net_change_nir
          source_band: 92
        - id: mean_recovery_rate
          source_band: 93
        - id: mean_decline_rate
          source_band: 94

        # Section 5: disturbance history (9)
        - id: num_segments
          source_band: 95
        - id: break_count
          source_band: 96
        - id: break_rate_per_decade
          source_band: 97
        - id: years_since_last_break
          source_band: 98
        - id: mean_segment_duration
          source_band: 99
        - id: max_segment_duration
          source_band: 100
        - id: min_segment_duration
          source_band: 101
        - id: mean_break_magnitude
          source_band: 102
        - id: max_break_magnitude
          source_band: 103

        # Section 6: variability (5)
        - id: variance_ndvi
          source_band: 104
        - id: variance_nir
          source_band: 105
        - id: cv_segment_duration
          source_band: 106
        - id: mean_rmse_joint
          source_band: 107
        - id: max_rmse_joint
          source_band: 108

        # Section 7: rapid loss (6)
        - id: rapid_loss_rate_per_decade
          source_band: 109
        - id: rapid_loss_mean_magnitude
          source_band: 110
        - id: rapid_loss_year_1
          source_band: 111
          fill_value: {source: -9999, target: na}
        - id: rapid_loss_year_2
          source_band: 112
          fill_value: {source: -9999, target: na}
        - id: rapid_loss_year_3
          source_band: 113
          fill_value: {source: -9999, target: na}
        - id: rapid_loss_year_4
          source_band: 114
          fill_value: {source: -9999, target: na}

        # Section 8: loss recovery (2)
        - id: mean_loss_recovery_duration
          source_band: 115
          fill_value: {source: -9999, target: na}
        - id: std_loss_recovery_duration
          source_band: 116
          fill_value: {source: -9999, target: na}
