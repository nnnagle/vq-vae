# ================================================================
# Forest Representation Learning - Training Configuration v0
# ================================================================
version: "1.0"
name: forest_trajectory_v0

config:
  bindings_path: config/frl_binding_v1.yaml
  model_path: config/frl_repr_model_v1.yaml
  
run:
  experiment_name: frl_v0_exp015
  run_root: runs
  ckpt_dir: checkpoints
  log_dir: logs
  
  checkpoint:
    save_every_n_epochs: 5
    save_top_k: 3
    monitor: val/loss_total
    mode: min
    save_last: true
    
hardware:
  device: cuda
  gpu_ids: [0]
  num_workers: 4
  pin_memory: true
  
  mixed_precision:
    enabled: true
    dtype: bfloat16
    
training:
  epoch:
    num_epochs: 400
    mode: number # full/frac/number - use every batch or take a sample
    sample_frac: .1
    sample_number: 500
    batch_size: 12
  
  gradient_clip:
    enabled: true
    max_norm: 1.0
    
  early_stopping:
    enabled: true
    patience: 15
    
  validation:
    enabled: true
    val_every_n_epochs: 1
    val_fraction: 0.15
    
optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 0.01
        
scheduler:
  name: cosine_warmup

  # Phase 1 (epochs 0 → warmup.epochs): linear warmup, LR rises 0 → peak.
  # Prevents destructively large gradient steps while weights are random.
  warmup:
    enabled: true
    epochs: 10          # 5% of 200 epochs; ramp is short but avoids early instability

  # Phase 2 (epochs warmup → curriculum_start_epoch): cosine decay from peak.
  # Spectral/spatial losses train freely while phase loss is silent (weight=0).

  # Phase 3 (curriculum_start_epoch → curriculum_start_epoch + phase_warmup.epochs):
  # True re-warmup for phase parameters. When phase loss enters, AdamW's variance
  # estimates (v_t) for phase-specific parameters are zero — bias correction makes
  # the first update a unit-norm step at whatever LR is current, which is dangerously
  # large near peak. To fix this:
  #   a) LR drops immediately to start_factor × lr at curriculum_start_epoch,
  #      giving the optimizer low-LR steps to accumulate reliable v_t estimates.
  #   b) LR then ramps linearly up to peak_factor × lr over phase_warmup.epochs,
  #      mirroring the initial warmup but scoped to the phase-loss entry point.
  phase_warmup:
    enabled: true
    epochs: 5           # length of the ramp from start_factor → peak_factor
    start_factor: 0.05  # immediate LR drop on phase entry (5% of peak); low enough
                        # for AdamW to accumulate v_t before taking large steps
    peak_factor: 1.0    # LR target at end of re-warmup; 1.0 = back to full peak lr

  # Phase 4 (phase_warmup_end → end): cosine decay from peak_factor × lr down to eta_min.
  # ~165 epochs of smooth decay covering the bulk of training.
  eta_min: 1.0e-6       # floor ≈ 1% of peak lr; prevents LR from reaching zero
    
spatial_domain:
  debug_mode: false
  debug_window:
    origin: [6016, 11264] #[row, col] — top-left of old test dataset within full VA extent
    size: [4096, 4096] # [H,W]
    block_grid: [1,1]
  full_domain:
    origin: [0, 0] # row, col
    size: [13056, 23552] # Height, Width
    block_grid: [7, 7] # The val/train/test split using a block size of [y,x] patches
    
model:
  type_encoder_feature: type_encoder_input  # bindings feature name fed to the type encoder
  phase_encoder_feature: phase_ccdc         # bindings feature name fed to the phase encoder

sampling:
  patch_size: 256
  grid_subsample:
    enabled: false
    grid_size: [16, 16]
  forest_samples:
    enabled: false
    per_patch: 64

masking:
  global_mask: [shared.masks.aoi, shared.masks.forest]
  per_loss_masks:
    z_type_triplet: [shared.masks.aoi, shared.masks.forest]
  global_weight: shared.quality.forest_weight
    
metrics:
  train: [loss_total, loss_vq, loss_triplet, learning_rate]
  validation: [loss_total, loss_vq]
  latent_analysis:
    enabled: true
    compute_every_n_epochs: 10
      
visualization:
  enabled: false
  tensorboard:
    log_images_every_n_epochs: 5
    
reproducibility:
  seed: 42
  benchmark: true