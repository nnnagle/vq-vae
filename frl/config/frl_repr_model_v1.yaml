version: "4"
name: frl_repr_model_v1

# ================================================================
# Latent dimensions
# ================================================================
# z_type_dim ties together: type_encoder output, spatial_conv channels,
# and FiLM cond_dim. Changing it requires consistent adjustment of
# type_encoder.channels[-1].
#
# z_phase_dim ties together: phase_head output and FiLM target_dim.
# ================================================================
latents:
  z_type_dim: 48
  z_phase_dim: 8

# ================================================================
# Type pathway
# ================================================================
type_encoder:
  # channels[-1] must equal latents.z_type_dim
  channels: [128, 48]
  kernel_size: 1
  padding: 0
  dropout: [0.1, 0.0]
  num_groups: 8

  # input_dropout: zeros entire input channel maps before the first conv.
  # Forces the encoder to learn cross-band structure rather than per-band features.
  #
  # Option A — constant rate (scalar):
  #   input_dropout: 0.05
  #
  # Option B — scheduled rate (dict):
  #   input_dropout:
  #     schedule: linear    # or: cosine
  #     start: 0.0          # rate at epoch 0
  #     end: 0.1            # rate after ramp completes
  #     epochs: 20          # ramp length; holds at `end` thereafter
  #
  input_dropout:
    schedule: linear
    start: 0.0    # no dropout at epoch 0 — let the model warm up first
    end: 0.10     # ramp to 10 % over the first 20 epochs, then hold
    epochs: 20

spatial_conv:
  # channels are inferred from latents.z_type_dim
  num_layers: 2           # retained for signature compat; unused in EdgeAwareSmoothingConv2D
  kernel_size: 3
  padding: 1
  gate_hidden: 64
  gate_kernel_size: 3
  num_directions: 4       # orientations in filter bank; total K = num_directions × 2 scales
  coarse_dilation: 3      # dilation for coarse-scale bank filters (7×7 effective)
  rank: 4                 # R shared direction-basis patterns; channels correlated but not tied

# ================================================================
# Type projection head (SimCLR-style)
# ================================================================
# Applied between z_type and InfoNCE losses during training.
# Discarded at inference — z_type is used directly downstream.
# VICReg operates on raw z_type (not projected) to guard backbone.
type_projection:
  enabled: true
  hidden_dim: 48      # matches z_type_dim; single bottleneck layer
  output_dim: 8       # small: spectral data has ~3-4 significant PCs
  l2_normalize: true

# ================================================================
# Phase pathway
# ================================================================
phase_tcn:
  channels: [64, 64, 64]
  kernel_size: 3
  dilations: [1, 2, 4]
  dropout: 0.1
  num_groups: 8
